<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cam & Kara — Europe 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #1c1714;
      color: #ece4d8;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    .site-header {
      background: linear-gradient(135deg, #2a1814 0%, #4a2a1c 55%, #6b4326 100%);
      padding: 2.5rem 1.5rem;
      text-align: center;
      border-bottom: 2px solid #c9a96e;
    }
    .site-header h1 {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #e8c69a;
      margin-bottom: 0.25rem;
    }
    .site-header .subtitle {
      font-size: 0.95rem;
      color: #d4b896;
      font-style: italic;
    }

    /* ---- Layout ---- */
    .main-layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      height: calc(100vh - 110px);
    }
    @media (max-width: 800px) {
      .main-layout {
        grid-template-columns: 1fr;
        height: auto;
      }
      #map { height: 50vh !important; }
    }

    /* ---- Sidebar ---- */
    .sidebar {
      overflow-y: auto;
      padding: 0;
      background: #241d17;
      border-right: 1px solid #3a2e26;
    }

    /* Day filter pills */
    .day-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      padding: 0.75rem;
      background: #1c1612;
      border-bottom: 1px solid #3a2e26;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .day-pill {
      padding: 0.35rem 0.75rem;
      border: 1.5px solid #4a3a30;
      background: transparent;
      color: #a89788;
      border-radius: 20px;
      font-size: 0.75rem;
      font-family: -apple-system, sans-serif;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .day-pill:hover { border-color: #c9a96e; color: #c9a96e; }
    .day-pill.active {
      background: #c9a96e;
      color: #1c1612;
      border-color: #c9a96e;
    }

    /* Section header (Cam / Kara) */
    .section-header {
      padding: 1.25rem 1.25rem 0.75rem;
      border-bottom: 1px solid #3a2e26;
      background: #1c1612;
      cursor: pointer;
      transition: background 0.2s;
    }
    .section-header:hover { background: #251d17; }
    .section-header:hover .section-header-label { color: #e8c69a; }
    .section-header-label {
      font-family: -apple-system, sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #c9a96e;
      transition: color 0.2s;
    }
    .section-header-sub {
      font-size: 0.8rem;
      color: #a89788;
      margin-top: 0.35rem;
      line-height: 1.4;
    }

    /* Day cards */
    .day-card {
      padding: 1.25rem;
      border-bottom: 1px solid #3a2e26;
      cursor: pointer;
      transition: background 0.2s;
    }
    .day-card:hover { background: #2e251f; }
    .day-card.active { background: #2e251f; border-left: 3px solid #c9a96e; }

    .day-date {
      font-family: -apple-system, sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8a7868;
      margin-bottom: 0.25rem;
    }
    .day-card.active .day-date { color: #c9a96e; }

    .day-title {
      font-size: 1.1rem;
      font-weight: 400;
      color: #ece4d8;
      margin-bottom: 0.4rem;
    }
    .day-summary {
      font-size: 0.85rem;
      color: #a89788;
      line-height: 1.5;
    }
    .day-stats {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.5rem;
      font-family: -apple-system, sans-serif;
      font-size: 0.7rem;
      color: #8a7868;
    }

    /* Stop list */
    .stop-list {
      margin-top: 0.75rem;
      padding-left: 1rem;
      border-left: 2px solid #3a2e26;
    }
    .stop-item {
      padding: 0.4rem 0;
      font-size: 0.8rem;
      color: #b0a090;
      cursor: pointer;
      transition: color 0.15s;
    }
    .stop-item:hover { color: #c9a96e; }
    .stop-name { font-weight: 600; color: #c8b8a8; }
    .stop-item:hover .stop-name { color: #c9a96e; }
    .stop-note { font-size: 0.75rem; font-style: italic; color: #8a7868; margin-top: 0.1rem; }

    /* ---- Photo Carousel ---- */
    .carousel-section {
      margin-top: 0.75rem;
    }
    .carousel-group {
      margin-bottom: 0.75rem;
    }
    .carousel-label {
      font-family: -apple-system, sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: #8a7868;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.35rem;
    }
    .carousel-track {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.4rem;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .carousel-track::-webkit-scrollbar { height: 4px; }
    .carousel-track::-webkit-scrollbar-track { background: #3a2e26; border-radius: 2px; }
    .carousel-track::-webkit-scrollbar-thumb { background: #6b5a4a; border-radius: 2px; }

    .carousel-item {
      flex: 0 0 auto;
      scroll-snap-align: start;
      cursor: pointer;
      position: relative;
    }
    .carousel-item img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 4px;
      display: block;
      opacity: 0.85;
      transition: all 0.15s;
    }
    .carousel-item:hover img {
      opacity: 1;
      transform: scale(1.03);
    }
    /* Time-of-day border — set dynamically via inline style */
    .carousel-item .time-border {
      position: absolute;
      inset: 0;
      border-radius: 4px;
      border: 2.5px solid transparent;
      pointer-events: none;
    }
    .carousel-item .time-label {
      position: absolute;
      bottom: 2px;
      right: 3px;
      font-family: -apple-system, sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 0 0.25rem;
      border-radius: 2px;
      pointer-events: none;
    }

    /* ---- Time Legend ---- */
    .time-legend {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.5rem;
      font-family: -apple-system, sans-serif;
      font-size: 0.65rem;
      color: #8a7868;
    }
    .time-legend-bar {
      height: 6px;
      width: 100px;
      border-radius: 3px;
      background: linear-gradient(to right, #4a90d9, #f0c040, #e8833a, #9b59b6);
    }

    /* ---- Map ---- */
    #map {
      height: 100%;
      width: 100%;
      background: #1f1812;
    }
    /* Warm the cool-blue dark map tiles toward sepia */
    .leaflet-tile-pane {
      filter: sepia(25%) saturate(115%) hue-rotate(-8deg) brightness(0.95);
    }

    /* ---- Lightbox ---- */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .lightbox-img-wrap {
      position: relative;
      max-width: 90vw;
      max-height: 70vh;
    }
    .lightbox-img-wrap img {
      max-width: 90vw;
      max-height: 70vh;
      border-radius: 4px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.5);
      display: block;
    }
    .lightbox-bottom {
      margin-top: 1rem;
      text-align: center;
      max-width: 600px;
      width: 90vw;
    }
    .lightbox-loc {
      font-weight: 600;
      color: #c9a96e;
      font-size: 0.95rem;
    }
    .lightbox-time {
      font-size: 0.8rem;
      color: #a89788;
      margin-top: 0.2rem;
    }
    .lightbox-caption {
      margin-top: 0.65rem;
      font-family: Georgia, serif;
      font-size: 0.95rem;
      color: #ece4d8;
      line-height: 1.5;
      font-style: italic;
    }
    .lightbox-caption:empty { display: none; }

    .lightbox-close {
      position: fixed;
      top: 1rem;
      right: 1.5rem;
      font-size: 2rem;
      color: #a89788;
      cursor: pointer;
      z-index: 1001;
      font-family: -apple-system, sans-serif;
    }
    .lightbox-close:hover { color: #f5e6d0; }
    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.5rem;
      color: #8a7868;
      cursor: pointer;
      z-index: 1001;
      padding: 1rem;
      font-family: -apple-system, sans-serif;
      user-select: none;
    }
    .lightbox-nav:hover { color: #f5e6d0; }
    .lightbox-prev { left: 0.5rem; }
    .lightbox-next { right: 0.5rem; }

    .hidden { display: none !important; }

    /* Leaflet popup overrides */
    .leaflet-popup-content-wrapper {
      background: #241d17;
      color: #ece4d8;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .leaflet-popup-tip { background: #241d17; }
    .leaflet-popup-content { margin: 0.5rem; min-width: 210px; }
    .popup-img {
      width: 210px;
      height: 160px;
      object-fit: cover;
      border-radius: 4px;
      cursor: pointer;
      display: block;
    }
    .popup-text { font-size: 0.8rem; margin-top: 0.4rem; color: #b0a090; }
    .popup-loc { font-weight: 600; color: #c9a96e; font-size: 0.85rem; }
    .popup-caption {
      color: #ece4d8;
      font-family: Georgia, serif;
      font-size: 0.8rem;
      font-style: italic;
      margin-top: 0.35rem;
      line-height: 1.4;
    }
    .popup-caption:empty { display: none; }
    .popup-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.35rem;
    }
    .popup-nav-btn {
      background: none;
      border: 1px solid #4a3a30;
      color: #c8b8a8;
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: -apple-system, sans-serif;
    }
    .popup-nav-btn:hover { border-color: #c9a96e; color: #c9a96e; }
    .popup-counter {
      font-family: -apple-system, sans-serif;
      font-size: 0.7rem;
      color: #8a7868;
    }
  </style>
</head>
<body>

<div class="site-header">
  <h1>CAM & KARA</h1>
  <div class="subtitle">Germany &middot; Paris &mdash; April 2026</div>
</div>

<div class="main-layout">
  <div class="sidebar" id="sidebar">
    <div class="day-nav" id="day-nav"></div>
    <div id="day-list"></div>
  </div>
  <div id="map"></div>
</div>

<!-- Lightbox -->
<div class="lightbox hidden" id="lightbox">
  <div class="lightbox-close" onclick="closeLightbox()">&times;</div>
  <div class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)">&lsaquo;</div>
  <div class="lightbox-nav lightbox-next" onclick="navLightbox(1)">&rsaquo;</div>
  <div class="lightbox-img-wrap">
    <img id="lightbox-img" src="" alt="">
  </div>
  <div class="lightbox-bottom">
    <div class="lightbox-loc" id="lightbox-loc"></div>
    <div class="lightbox-time" id="lightbox-time"></div>
    <div class="lightbox-caption" id="lightbox-caption"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
<script>
// ============================================================
// State
// ============================================================
var itinerary = [];
var photos = [];
var map;
var photoMarkers = [];
var stopMarkers = [];
var routeLines = [];
var activeDay = null;
var lightboxPhotos = [];
var lightboxIdx = 0;

var PHOTO_BASE = 'https://optzbdbavpnxstpxrpbh.supabase.co/storage/v1/object/public/trip-photos/full/';
var THUMB_BASE = 'https://optzbdbavpnxstpxrpbh.supabase.co/storage/v1/object/public/trip-photos/thumbs/';

// Trip timezone — Central European Summer Time (UTC+2) for France/Germany in April.
// Photo timestamps are stored in UTC; we shift for display so labels match what Cam saw on his phone.
var TRIP_OFFSET_HOURS = 2;

// ============================================================
// Time-of-day color gradient
// Maps hour (0-23 UTC) to a border color
// Dawn blue → morning gold → afternoon orange → evening purple
// ============================================================
function timeColor(timestamp) {
  if (!timestamp) return '#555';
  var d = new Date(timestamp);
  var h = ((d.getUTCHours() + TRIP_OFFSET_HOURS) % 24) + d.getUTCMinutes() / 60;

  // Clamp to 6am-21pm range for color spread
  var t = Math.max(0, Math.min(1, (h - 6) / 15));

  // 4-stop gradient: blue → gold → orange → purple
  var stops = [
    { p: 0.0, r: 74, g: 144, b: 217 },  // dawn blue
    { p: 0.35, r: 240, g: 192, b: 64 },  // morning gold
    { p: 0.65, r: 232, g: 131, b: 58 },  // afternoon orange
    { p: 1.0, r: 155, g: 89, b: 182 }    // evening purple
  ];

  var a = stops[0], b = stops[1];
  for (var i = 1; i < stops.length; i++) {
    if (t <= stops[i].p) { a = stops[i-1]; b = stops[i]; break; }
    if (i === stops.length - 1) { a = stops[i-1]; b = stops[i]; }
  }

  var mix = (t - a.p) / (b.p - a.p);
  mix = Math.max(0, Math.min(1, mix));
  var r = Math.round(a.r + (b.r - a.r) * mix);
  var g = Math.round(a.g + (b.g - a.g) * mix);
  var bl = Math.round(a.b + (b.b - a.b) * mix);
  return 'rgb(' + r + ',' + g + ',' + bl + ')';
}

function shortTime(timestamp) {
  if (!timestamp) return '';
  var d = new Date(timestamp);
  var h = (d.getUTCHours() + TRIP_OFFSET_HOURS) % 24;
  var m = d.getUTCMinutes();
  var ampm = h >= 12 ? 'p' : 'a';
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  return h + ':' + (m < 10 ? '0' : '') + m + ampm;
}

// ============================================================
// Cluster nearby photos by GPS proximity
// ============================================================
function clusterPhotos(dayPhotos) {
  if (dayPhotos.length === 0) return [];

  var groups = [];
  var used = new Array(dayPhotos.length).fill(false);
  var THRESHOLD = 0.005; // ~500m

  for (var i = 0; i < dayPhotos.length; i++) {
    if (used[i]) continue;
    var seed = dayPhotos[i];
    var group = { photos: [seed], lat: seed.lat, lng: seed.lng };
    used[i] = true;

    for (var j = i + 1; j < dayPhotos.length; j++) {
      if (used[j]) continue;
      var cand = dayPhotos[j];

      var nearby = false;
      if (cand.lat !== null && group.lat !== null) {
        var dlat = Math.abs(cand.lat - group.lat);
        var dlng = Math.abs(cand.lng - group.lng);
        nearby = (dlat < THRESHOLD && dlng < THRESHOLD);
      }
      var sameLoc = cand.location && seed.location && cand.location === seed.location;

      if (nearby || sameLoc) {
        group.photos.push(cand);
        used[j] = true;
        // Inherit GPS from the first member that has it — lets no-GPS seeds
        // get mapped via later same-location photos.
        if (group.lat === null && cand.lat !== null) {
          group.lat = cand.lat;
          group.lng = cand.lng;
        }
      }
    }

    // Name the cluster by location or nearest stop
    var label = group.photos[0].location || '';
    if (!label && group.lat) {
      label = nearestStopName(group.lat, group.lng);
    }
    if (!label) label = shortTime(group.photos[0].timestamp);
    group.label = label;
    groups.push(group);
  }

  return groups;
}

function nearestStopName(lat, lng) {
  var best = '';
  var bestDist = Infinity;
  itinerary.forEach(function(d) {
    (d.stops || []).forEach(function(s) {
      if (!s.lat) return;
      var dist = Math.abs(s.lat - lat) + Math.abs(s.lng - lng);
      if (dist < bestDist && dist < 0.05) {
        bestDist = dist;
        best = s.name;
      }
    });
  });
  return best;
}

// ============================================================
// Init
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  Promise.all([
    fetch('data/itinerary.json').then(function(r) { return r.json(); }),
    fetch('data/photos.json').then(function(r) { return r.json(); })
  ]).then(function(results) {
    itinerary = results[0];
    photos = results[1];

    // Load saved captions from localStorage
    var saved = localStorage.getItem('photo-captions');
    if (saved) {
      var captions = JSON.parse(saved);
      photos.forEach(function(p) {
        if (captions[p.id]) p.caption = captions[p.id];
      });
    }

    initMap();
    renderDayNav();
    renderDayList();
    showDay('all');
  });
});

// ============================================================
// Map
// ============================================================
function initMap() {
  map = L.map('map', { zoomControl: true, attributionControl: false })
    .setView([49.5, 2.5], 6);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);
}

// Store cluster data globally so popup navigation can access it
var mapClusters = [];

function plotDay(dayNum) {
  var dayPhotos;
  if (dayNum === 'all') {
    dayPhotos = photos.slice();
  } else {
    // Show all photos (Cam + Kara) for this date — both trips on the map together.
    var entry = itinerary.find(function(d) { return d.day === dayNum; });
    dayPhotos = entry ? photos.filter(function(p) { return p.date === entry.date; }) : [];
  }
  plotPhotos(dayPhotos);
}

function plotPhotos(dayPhotos) {
  clearMapLayers();
  mapClusters = [];

  // Route line uses only GPS-tagged photos, in chronological order
  var sorted = dayPhotos.filter(function(p) { return p.lat !== null; }).sort(function(a, b) {
    return (a.timestamp || '').localeCompare(b.timestamp || '');
  });

  var bounds = [];

  // Cluster photos by proximity (or shared location string when GPS is missing)
  var clusters = clusterPhotos(dayPhotos);
  mapClusters = clusters;

  clusters.forEach(function(cluster, ci) {
    // Skip clusters with no GPS at all — can't place them on the map
    if (cluster.lat === null) return;

    var firstPhoto = cluster.photos[0];
    var color = timeColor(firstPhoto.timestamp);
    var thumbSrc = firstPhoto.thumb_url || (THUMB_BASE + firstPhoto.jpg);

    // Show count badge if more than 1 photo
    var countBadge = cluster.photos.length > 1
      ? '<div style="position:absolute; top:-4px; right:-4px; background:#c9a96e; color:#1c1612; ' +
        'border-radius:50%; width:16px; height:16px; font-size:0.6rem; font-weight:700; ' +
        'display:flex; align-items:center; justify-content:center; font-family:-apple-system,sans-serif; ' +
        'border:1px solid #241d17;">' + cluster.photos.length + '</div>'
      : '';

    var icon = L.divIcon({
      className: '',
      html: '<div style="position:relative; width:36px; height:36px;">' +
        '<div style="width:36px; height:36px; border-radius:50%; border:2.5px solid ' + color + '; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.4);">' +
        '<img src="' + thumbSrc + '" style="width:100%; height:100%; object-fit:cover;" /></div>' +
        countBadge + '</div>',
      iconSize: [36, 36],
      iconAnchor: [18, 18]
    });

    var marker = L.marker([cluster.lat, cluster.lng], { icon: icon }).addTo(map);

    // Build navigable popup
    marker.on('click', function() {
      showClusterPopup(marker, ci, 0);
    });

    // Index-align with mapClusters so popup nav can look up via photoMarkers[clusterIdx]
    photoMarkers[ci] = marker;
    bounds.push([cluster.lat, cluster.lng]);
  });

  // Route line from photo timestamps (not itinerary).
  // Kara's separate Germany trip is its own line; her Paris photos merge into the main line
  // because we were together in Paris. An arrowhead at the newest endpoint shows direction.
  var mainPhotos = sorted.filter(function(p) { return !isKaraSeparate(p); });
  var karaPhotos = sorted.filter(isKaraSeparate);

  [mainPhotos, karaPhotos].forEach(function(group) {
    if (group.length < 2) return;
    var coords = group.map(function(p) { return [p.lat, p.lng]; });
    var line = L.polyline(coords, {
      color: '#c9a96e',
      weight: 2,
      opacity: 0.5,
      dashArray: '6,8'
    }).addTo(map);
    routeLines.push(line);

    if (typeof L.polylineDecorator === 'function') {
      var arrow = L.polylineDecorator(line, {
        patterns: [{
          offset: '100%',
          repeat: 0,
          symbol: L.Symbol.arrowHead({
            pixelSize: 12,
            polygon: false,
            pathOptions: { stroke: true, color: '#c9a96e', weight: 2, opacity: 0.85 }
          })
        }]
      }).addTo(map);
      routeLines.push(arrow);
    }
  });

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
  }
}

function showClusterPopup(marker, clusterIdx, photoIdx) {
  var cluster = mapClusters[clusterIdx];
  if (!cluster) return;
  var p = cluster.photos[photoIdx];
  if (!p) return;

  var thumbSrc = p.thumb_url || (THUMB_BASE + p.jpg);
  var total = cluster.photos.length;
  var locName = p.location || nearestStopName(p.lat, p.lng) || '';

  var html = '<img class="popup-img" src="' + thumbSrc + '" ' +
    'onclick="openLightboxFromMap(\'' + p.id + '\')" />';

  html += '<div class="popup-text">';
  if (locName) html += '<div class="popup-loc">' + locName + '</div>';
  html += '<div>' + formatTimestamp(p.timestamp) + '</div>';
  if (p.caption) html += '<div class="popup-caption">' + escapeHtml(p.caption) + '</div>';
  html += '</div>';

  // Navigation arrows if multiple photos in cluster
  if (total > 1) {
    var prevIdx = (photoIdx - 1 + total) % total;
    var nextIdx = (photoIdx + 1) % total;
    html += '<div class="popup-nav">';
    html += '<button class="popup-nav-btn" onclick="showClusterPopup(photoMarkers[' + clusterIdx + '],' + clusterIdx + ',' + prevIdx + ')">&lsaquo; Prev</button>';
    html += '<span class="popup-counter">' + (photoIdx + 1) + ' / ' + total + '</span>';
    html += '<button class="popup-nav-btn" onclick="showClusterPopup(photoMarkers[' + clusterIdx + '],' + clusterIdx + ',' + nextIdx + ')">Next &rsaquo;</button>';
    html += '</div>';
  }

  marker.unbindPopup();
  marker.bindPopup(html, { maxWidth: 300, className: '' }).openPopup();
}

function clearMapLayers() {
  photoMarkers.forEach(function(m) { map.removeLayer(m); });
  stopMarkers.forEach(function(m) { map.removeLayer(m); });
  routeLines.forEach(function(l) { map.removeLayer(l); });
  photoMarkers = [];
  stopMarkers = [];
  routeLines = [];
}

// ============================================================
// Day Nav
// ============================================================
// True if this photo belongs to Kara's separate (non-Paris) Germany trip.
function isKaraSeparate(p) {
  return p.photographer === 'Kara' && p.category !== 'paris';
}

function renderDayNav() {
  var nav = document.getElementById('day-nav');
  var html = '<button class="day-pill active" onclick="showDay(\'all\')">All</button>';
  itinerary.forEach(function(d) {
    if (d.trip === 'kara') return; // Kara cards aren't part of the day-pill cycle
    var n = photos.filter(function(p) { return p.day === d.day && !isKaraSeparate(p); }).length;
    if (n === 0) return;
    html += '<button class="day-pill" onclick="showDay(' + d.day + ')">Day ' + d.day + '</button>';
  });
  nav.innerHTML = html;
}

// ============================================================
// Day List
// ============================================================
function photosForEntry(d) {
  if (d.trip === 'kara') {
    return photos.filter(function(p) {
      return p.date === d.date && isKaraSeparate(p);
    });
  }
  return photos.filter(function(p) {
    return p.day === d.day && !isKaraSeparate(p);
  });
}

function renderDayList() {
  var list = document.getElementById('day-list');
  var html = '';

  var camEntries = itinerary.filter(function(d) { return d.trip !== 'kara'; });
  var karaEntries = itinerary.filter(function(d) { return d.trip === 'kara'; });

  function renderEntry(d) {
    var dayPhotos = photosForEntry(d);
    if (dayPhotos.length === 0) return '';
    var photoCount = dayPhotos.length;
    var stopCount = (d.stops || []).length;

    var trip = d.trip === 'kara' ? 'kara' : 'cam';
    var inner = '<div class="day-card" id="day-card-' + d.day + '" data-trip="' + trip + '" data-date="' + d.date + '" onclick="showDay(' + d.day + ')">';
    inner += '<div class="day-date">' + formatDate(d.date) + '</div>';
    inner += '<div class="day-title">' + d.title + '</div>';
    inner += '<div class="day-summary">' + d.summary + '</div>';
    inner += '<div class="day-stats">';
    if (photoCount > 0) inner += '<span>&#128247; ' + photoCount + ' photos</span>';
    if (stopCount > 0) inner += '<span>&#128205; ' + stopCount + ' stops</span>';
    inner += '</div>';

    // Stops
    if (d.stops && d.stops.length > 0) {
      inner += '<div class="stop-list hidden" id="stops-' + d.day + '">';
      d.stops.forEach(function(s) {
        inner += '<div class="stop-item" onclick="flyToStop(' + s.lat + ',' + s.lng + ', event)">';
        inner += '<div class="stop-name">' + s.name + '</div>';
        if (s.note) inner += '<div class="stop-note">' + s.note + '</div>';
        inner += '</div>';
      });
      inner += '</div>';
    }

    // Photo carousels grouped by location
    inner += '<div class="carousel-section hidden" id="photos-' + d.day + '">';
    var groups = clusterPhotos(dayPhotos);
    groups.forEach(function(g) {
      inner += '<div class="carousel-group">';
      if (g.label) inner += '<div class="carousel-label">' + escapeHtml(g.label) + '</div>';
      inner += '<div class="carousel-track">';
      g.photos.forEach(function(p) {
        var thumbSrc = p.thumb_url || (THUMB_BASE + p.jpg);
        var color = timeColor(p.timestamp);
        inner += '<div class="carousel-item" onclick="openLightbox(' + d.day + ',\'' + p.id + '\', event)">';
        inner += '<img src="' + thumbSrc + '" loading="lazy" />';
        inner += '<div class="time-border" style="border-color:' + color + ';"></div>';
        inner += '<div class="time-label">' + shortTime(p.timestamp) + '</div>';
        inner += '</div>';
      });
      inner += '</div></div>';
    });
    inner += '<div class="time-legend"><span>AM</span><div class="time-legend-bar"></div><span>PM</span></div>';
    inner += '</div>';

    inner += '</div>';
    return inner;
  }

  var camHtml = camEntries.map(renderEntry).join('');
  var karaHtml = karaEntries.map(renderEntry).join('');

  if (camHtml) {
    html += '<div class="section-header" data-trip="cam" onclick="showTrip(\'cam\')">' +
            '<div class="section-header-label">Cam</div>' +
            '<div class="section-header-sub">Normandy, grandpa\'s WWII sites in Germany, and Paris with my dad, uncle Doug, and brothers.</div>' +
            '</div>';
    html += camHtml;
  }
  if (karaHtml) {
    html += '<div class="section-header" data-trip="kara" onclick="showTrip(\'kara\')">' +
            '<div class="section-header-label">Kara</div>' +
            '<div class="section-header-sub">A separate week in Germany visiting old roommates, then meeting up with Cam in Paris.</div>' +
            '</div>';
    html += karaHtml;
  }

  list.innerHTML = html;
}

// ============================================================
// Show Day
// ============================================================
function showDay(dayNum) {
  activeDay = dayNum;

  document.querySelectorAll('.day-pill').forEach(function(btn, i) {
    if (dayNum === 'all') {
      btn.classList.toggle('active', i === 0);
    } else {
      btn.classList.toggle('active', btn.textContent === 'Day ' + dayNum);
    }
  });

  // Determine the date to focus on. Picking any day (Cam or Kara) shows ALL
  // entries (and photos) for that date — both trips, side by side.
  var targetDate = null;
  if (dayNum !== 'all') {
    var entry = itinerary.find(function(d) { return d.day === dayNum; });
    if (entry) targetDate = entry.date;
  }

  // Reset all card and section state
  document.querySelectorAll('.day-card').forEach(function(card) { card.classList.remove('active'); });
  document.querySelectorAll('.stop-list, .carousel-section').forEach(function(el) { el.classList.add('hidden'); });

  // Hide cards that don't match the selected date; show all when 'all'
  document.querySelectorAll('.day-card').forEach(function(card) {
    if (dayNum === 'all' || card.dataset.date === targetDate) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });

  // Hide a section header if all of its cards are hidden
  document.querySelectorAll('.section-header').forEach(function(hdr) {
    var trip = hdr.dataset.trip;
    var anyVisible = false;
    document.querySelectorAll('.day-card[data-trip="' + trip + '"]').forEach(function(c) {
      if (!c.classList.contains('hidden')) anyVisible = true;
    });
    hdr.classList.toggle('hidden', !anyVisible);
  });

  if (dayNum !== 'all') {
    // Expand stops/photos for every visible card on this date (Cam + Kara)
    itinerary.forEach(function(d) {
      if (d.date !== targetDate) return;
      var stops = document.getElementById('stops-' + d.day);
      if (stops) stops.classList.remove('hidden');
      var strip = document.getElementById('photos-' + d.day);
      if (strip) strip.classList.remove('hidden');
    });
    var clicked = document.getElementById('day-card-' + dayNum);
    if (clicked) {
      clicked.classList.add('active');
      clicked.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  plotDay(dayNum);
}

function flyToStop(lat, lng, event) {
  if (event) event.stopPropagation();
  map.flyTo([lat, lng], 15, { duration: 1 });
}

// Clicking a section header (Cam / Kara) zooms the map to just that trip's photos.
// Left panel stays fully visible; only the map view changes.
function showTrip(trip) {
  activeDay = 'trip-' + trip;

  document.querySelectorAll('.day-pill').forEach(function(btn) { btn.classList.remove('active'); });
  document.querySelectorAll('.day-card').forEach(function(card) {
    card.classList.remove('active');
    card.classList.remove('hidden');
  });
  document.querySelectorAll('.stop-list, .carousel-section').forEach(function(el) { el.classList.add('hidden'); });
  document.querySelectorAll('.section-header').forEach(function(hdr) { hdr.classList.remove('hidden'); });

  var tripPhotos = trip === 'kara'
    ? photos.filter(isKaraSeparate)
    : photos.filter(function(p) { return !isKaraSeparate(p); });

  plotPhotos(tripPhotos);
}

// ============================================================
// Lightbox with caption editing
// ============================================================
function photosForDay(dayNum) {
  var entry = itinerary.find(function(d) { return d.day === dayNum; });
  if (entry && entry.trip === 'kara') {
    return photos.filter(function(p) { return p.date === entry.date && isKaraSeparate(p); });
  }
  return photos.filter(function(p) { return p.day === dayNum && !isKaraSeparate(p); });
}

function openLightbox(dayNum, photoId, event) {
  if (event) event.stopPropagation();
  lightboxPhotos = photosForDay(dayNum);
  lightboxIdx = lightboxPhotos.findIndex(function(p) { return p.id === photoId; });
  if (lightboxIdx < 0) lightboxIdx = 0;
  showLightboxPhoto();
  document.getElementById('lightbox').classList.remove('hidden');
}

function openLightboxFromMap(photoId) {
  var photo = photos.find(function(p) { return p.id === photoId; });
  if (!photo) return;
  if (activeDay === 'all') {
    lightboxPhotos = photos.filter(function(p) { return p.lat !== null; });
  } else if (activeDay === 'trip-kara') {
    lightboxPhotos = photos.filter(isKaraSeparate);
  } else if (activeDay === 'trip-cam') {
    lightboxPhotos = photos.filter(function(p) { return !isKaraSeparate(p); });
  } else {
    lightboxPhotos = photosForDay(activeDay);
  }
  lightboxIdx = lightboxPhotos.indexOf(photo);
  if (lightboxIdx < 0) lightboxIdx = 0;
  showLightboxPhoto();
  document.getElementById('lightbox').classList.remove('hidden');
}

function showLightboxPhoto() {
  var p = lightboxPhotos[lightboxIdx];
  if (!p) return;
  var fullSrc = p.url || (PHOTO_BASE + p.jpg);
  document.getElementById('lightbox-img').src = fullSrc;
  document.getElementById('lightbox-loc').textContent = p.location || nearestStopName(p.lat, p.lng) || '';
  document.getElementById('lightbox-time').textContent = formatTimestamp(p.timestamp);
  document.getElementById('lightbox-caption').textContent = p.caption || '';
}

function navLightbox(dir, event) {
  if (event) { event.stopPropagation(); event.preventDefault(); }
  lightboxIdx = (lightboxIdx + dir + lightboxPhotos.length) % lightboxPhotos.length;
  showLightboxPhoto();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.add('hidden');
}

document.addEventListener('keydown', function(e) {
  var lb = document.getElementById('lightbox');
  if (lb.classList.contains('hidden')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// Close lightbox when clicking backdrop (but not the image or caption area)
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

// ============================================================
// Helpers
// ============================================================
function formatDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T12:00:00');
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months = ['January','February','March','April','May','June',
    'July','August','September','October','November','December'];
  return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

function formatTimestamp(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var h = (d.getUTCHours() + TRIP_OFFSET_HOURS) % 24;
  var m = d.getUTCMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  return h + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
